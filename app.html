<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plantão Check — Ocorrências</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/print.css" media="print" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="app-page" data-theme="dark">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <span class="sb-icon">⚖</span>
        <span class="sb-title">Plantão<span class="sb-accent">Check</span></span>
      </div>
      <button class="sidebar-close" onclick="toggleSidebar()" title="Fechar menu">×</button>
    </div>

    <div class="sidebar-user" id="sidebarUser"></div>

    <nav class="sidebar-nav">
      <p class="nav-label">Ocorrências</p>
      <ul id="navList"></ul>

      <p class="nav-label" style="margin-top:1.5rem">Referências</p>
      <ul>
        <li><a href="#" class="nav-link" onclick="openRef('requisicoes')">📋 Requisições IML/IC</a></li>
        <li><a href="#" class="nav-link" onclick="openRef('orientacoes')">📌 Orientações Gerais</a></li>
      </ul>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-theme" onclick="toggleTheme()" id="themeBtn">☀ Modo Claro</button>
      <button class="btn-logout" onclick="handleLogout()">Sair</button>
    </div>
  </aside>

  <!-- OVERLAY -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- MAIN -->
  <main class="main-content" id="mainContent">

    <!-- TOPBAR -->
    <header class="topbar">
      <button class="hamburger" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-title" id="topbarTitle">Selecione uma ocorrência</div>
      <div class="topbar-actions">
        <button class="btn-icon" onclick="window.print()" title="Imprimir">🖨</button>
        <button class="btn-icon" onclick="generatePDF()" title="Gerar PDF">📄</button>
      </div>
    </header>

    <!-- HOME -->
    <div class="home-view" id="homeView">
      <div class="home-hero">
        <h2 class="home-title">Qual ocorrência deseja registrar?</h2>
        <p class="home-sub">Selecione o tipo para abrir o checklist correspondente</p>
      </div>
      <div class="occurrence-grid" id="occurrenceGrid"></div>
    </div>

    <!-- CHECKLIST VIEW -->
    <div class="checklist-view hidden" id="checklistView">

      <div class="cl-header">
        <div>
          <h2 class="cl-title" id="clTitle"></h2>
          <p class="cl-desc" id="clDesc"></p>
        </div>
        <div class="cl-progress-wrap">
          <div class="cl-progress-bar"><div class="cl-progress-fill" id="clProgressFill"></div></div>
          <span class="cl-progress-label" id="clProgressLabel">0 / 0</span>
        </div>
      </div>

      <div class="cl-body" id="clBody"></div>

      <div class="cl-actions">
        <button class="btn-secondary" onclick="resetChecklist()">↺ Reiniciar</button>
        <button class="btn-secondary" onclick="backToHome()">← Voltar</button>
        <button class="btn-primary" onclick="generatePDF()">📄 Gerar PDF</button>
      </div>

    </div>

    <!-- REFERENCE VIEW -->
    <div class="ref-view hidden" id="refView">
      <div class="ref-body" id="refBody"></div>
    </div>

  </main>

  <!-- TEMPLATE MODAL -->
  <div class="modal-backdrop hidden" id="modalBackdrop" onclick="closeModal()"></div>
  <div class="modal hidden" id="templateModal">
    <div class="modal-header">
      <h3 id="modalTitle">Gerar texto</h3>
      <button onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Fechar</button>
      <button class="btn-primary" onclick="generateTemplate()">Gerar texto</button>
    </div>
  </div>

  <script src="js/checklists.js"></script>
  <script src="js/templates.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
